<!DOCTYPE html>
<html>
<head>
    <title>RMM Viewer</title>
    <style>
        body { margin: 0; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #fps { position: fixed; top: 10px; left: 10px; color: #0f0; font: 16px monospace; }
        #status { position: fixed; top: 40px; left: 10px; color: #0f0; font: 14px monospace; }
        #debug { position: fixed; bottom: 10px; left: 10px; color: #ff0; font: 12px monospace; max-width: 90%; word-wrap: break-all; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="fps">FPS: 0</div>
    <div id="status">Connecting...</div>
    <div id="debug"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fpsEl = document.getElementById('fps');
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');
        
        let ws = null;
        let frameCount = 0;
        let lastFpsTime = Date.now();
        let fps = 0;
        let msgCount = 0;

        function log(msg) {
            console.log('[VIEWER]', msg);
            debugEl.textContent = '[VIEWER] ' + msg;
        }

        function connect() {
            statusEl.textContent = 'Connecting...';
            log('Connecting to ws://' + window.location.host + '/ws/viewer/agent1');
            
            ws = new WebSocket(`ws://${window.location.host}/ws/viewer/agent1`);
            
            ws.binaryType = 'arraybuffer';
            
            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                log('WebSocket CONNECTED');
            };
            
            ws.onmessage = (e) => {
                msgCount++;
                
                if (e.data instanceof ArrayBuffer) {
                    const buf = e.data;
                    const view = new DataView(buf);
                    const len = buf.byteLength;
                    
                    if (len >= 16) {
                        const width = view.getInt32(0, true);
                        const height = view.getInt32(4, true);
                        const timestamp = view.getFloat64(8, true);
                        const jpegLen = len - 16;
                        
                        if (msgCount <= 5) {
                            log(`Frame #${msgCount}: ${width}x${height}, JPEG=${jpegLen} bytes`);
                        }
                        
                        if (canvas.width !== width || canvas.height !== height) {
                            canvas.width = width;
                            canvas.height = height;
                            log(`Canvas resized to ${width}x${height}`);
                        }
                        
                        const blob = new Blob([new Uint8Array(buf, 16)], { type: 'image/jpeg' });
                        const url = URL.createObjectURL(blob);
                        
                        const img = new Image();
                        img.onload = () => {
                            ctx.drawImage(img, 0, 0);
                            URL.revokeObjectURL(url);
                            
                            frameCount++;
                            const now = Date.now();
                            if (now - lastFpsTime >= 1000) {
                                fps = frameCount;
                                frameCount = 0;
                                lastFpsTime = now;
                                fpsEl.textContent = `FPS: ${fps}`;
                            }
                        };
                        img.onerror = (err) => {
                            log('Image load ERROR: ' + err);
                        };
                        img.src = url;
                    } else {
                        log('Buffer too small: ' + len);
                    }
                } else {
                    log('TEXT: ' + e.data.substring(0, 100));
                }
            };
            
            ws.onclose = (e) => {
                statusEl.textContent = `Closed (${e.code})`;
                log(`WebSocket CLOSED: code=${e.code}, reason=${e.reason || 'none'}`);
                setTimeout(connect, 2000);
            };
            
            ws.onerror = (err) => {
                log('WebSocket ERROR: ' + (err.message || 'unknown'));
            };
        }
        
        connect();
    </script>
</body>
</html>
